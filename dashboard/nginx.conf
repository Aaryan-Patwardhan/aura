server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to ingestion service
    location /ingest/ {
        proxy_pass http://ingestion:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /sessions/ {
        proxy_pass http://ingestion:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://ingestion:8000/health;
        proxy_set_header Host $host;
    }

    # React SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
